<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マスターソード 制作フロー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e3a5f;
    --accent: #4fc3f7;
    --accent2: #7c3aed;
    --gold: #fbbf24;
    --text: #e2e8f0;
    --muted: #64748b;
    --done-bg: #052e16;
    --done-border: #16a34a;
    --done-text: #4ade80;
    --active-bg: #1e3a5f;
    --active-glow: #4fc3f7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .title-en {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    background: linear-gradient(135deg, #e2e8f0 0%, #4fc3f7 60%, #7c3aed 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  .progress-bar-wrap {
    margin: 20px auto 0;
    max-width: 360px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .progress-bar {
    height: 6px;
    background: var(--surface);
    border-radius: 99px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #4fc3f7, #7c3aed);
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  .phases {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 640px;
    margin: 0 auto;
  }

  .phase {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }

  .phase-icon {
    font-size: 20px;
    width: 32px;
    text-align: center;
    flex-shrink: 0;
  }

  .phase-title {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
  }

  .phase-count {
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.05);
    padding: 2px 8px;
    border-radius: 99px;
  }

  .phase-toggle {
    font-size: 12px;
    color: var(--muted);
    transition: transform 0.2s;
  }

  .phase.collapsed .phase-toggle {
    transform: rotate(-90deg);
  }

  .tasks {
    display: flex;
    flex-direction: column;
  }

  .phase.collapsed .tasks {
    display: none;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(30,58,95,0.4);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .task:last-child { border-bottom: none; }

  .task:hover { background: rgba(79,195,247,0.05); }

  .task.done {
    background: rgba(5,46,22,0.3);
  }

  .task.done .task-title {
    text-decoration: line-through;
    color: var(--done-text);
    opacity: 0.7;
  }

  .task.done .task-detail {
    color: var(--done-text);
    opacity: 0.4;
  }

  .task.active {
    background: rgba(30,58,95,0.5);
    border-left: 3px solid var(--active-glow);
  }

  .checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--muted);
    border-radius: 5px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .task.done .checkbox {
    background: var(--done-border);
    border-color: var(--done-border);
  }

  .task.done .checkbox::after {
    content: '✓';
    font-size: 12px;
    color: #fff;
    font-weight: 700;
  }

  .task.active .checkbox {
    border-color: var(--accent);
    box-shadow: 0 0 8px rgba(79,195,247,0.4);
  }

  .task-body { flex: 1; }

  .task-title {
    font-size: 14px;
    font-weight: 700;
    line-height: 1.4;
    color: var(--text);
  }

  .task-detail {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  .task-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    flex-shrink: 0;
    margin-top: 2px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .badge-buy { background: rgba(251,191,36,0.15); color: var(--gold); border: 1px solid rgba(251,191,36,0.3); }
  .badge-3d { background: rgba(124,58,237,0.15); color: #a78bfa; border: 1px solid rgba(124,58,237,0.3); }
  .badge-circuit { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .badge-code { background: rgba(14,165,233,0.12); color: #38bdf8; border: 1px solid rgba(14,165,233,0.3); }
  .badge-craft { background: rgba(251,113,133,0.12); color: #fb7185; border: 1px solid rgba(251,113,133,0.3); }

  .connector {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px 0 2px;
    color: var(--border);
    font-size: 18px;
  }

  .next-up {
    max-width: 640px;
    margin: 0 auto 28px;
    background: linear-gradient(135deg, rgba(79,195,247,0.08), rgba(124,58,237,0.08));
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .next-up-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .next-up-text {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  /* ── タイムライン ── */
  .timeline-section {
    max-width: 640px;
    margin: 0 auto 32px;
  }

  .timeline-heading {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 14px;
    padding-left: 4px;
  }

  .timeline-bar-wrap {
    position: relative;
    padding-bottom: 8px;
  }

  /* 月ラベル行 */
  .tl-months {
    display: flex;
    margin-bottom: 6px;
  }

  .tl-month {
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    text-align: left;
    padding-left: 4px;
  }

  /* レーン */
  .tl-track {
    background: rgba(30,58,95,0.35);
    border-radius: 4px;
    height: 8px;
    position: relative;
    margin-bottom: 10px;
    overflow: visible;
  }

  .tl-fill {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 4px;
    opacity: 0.85;
  }

  /* 今日線 */
  .tl-today {
    position: absolute;
    top: -28px;
    bottom: -4px;
    width: 2px;
    background: var(--gold);
    opacity: 0.8;
    z-index: 10;
  }

  .tl-today-label {
    position: absolute;
    top: -18px;
    left: 4px;
    font-size: 9px;
    color: var(--gold);
    font-weight: 700;
    white-space: nowrap;
  }

  /* フェーズ行 */
  .tl-rows {
    position: relative;
  }

  .tl-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    position: relative;
  }

  .tl-row-label {
    font-size: 11px;
    color: var(--muted);
    width: 90px;
    flex-shrink: 0;
    text-align: right;
    line-height: 1.3;
  }

  .tl-row-track {
    flex: 1;
    height: 18px;
    background: rgba(30,58,95,0.25);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }

  .tl-row-fill {
    position: absolute;
    top: 0;
    height: 100%;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding: 0 6px;
    font-size: 9px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    overflow: hidden;
    min-width: 4px;
  }

  .tl-deadline {
    font-size: 10px;
    color: #fb7185;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tl-grid-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 1px;
    background: rgba(30,58,95,0.5);
    pointer-events: none;
  }
</style>
</head>
<body>

const STORAGE_KEY = 'mastersword_done_v1';

function loadDone() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveDone(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...s])); } catch {}
}

let done = loadDone();

function allTaskIds() {
  return data.flatMap(p => p.tasks.map(t => t.id));
}

function updateProgress() {
  const all = allTaskIds();
  const count = all.filter(id => done.has(id)).length;
  document.getElementById('prog-text').textContent = `${count} / ${all.length}`;
  document.getElementById('prog-fill').style.width = `${Math.round(count / all.length * 100)}%`;

  // next up
  let nextTask = null, nextPhase = null;
  for (const phase of data) {
    for (const task of phase.tasks) {
      if (!done.has(task.id)) { nextTask = task; nextPhase = phase; break; }
    }
    if (nextTask) break;
  }
  const nu = document.getElementById('next-up');
  if (nextTask) {
    nu.style.display = 'flex';
    document.getElementById('next-up-text').textContent = `${nextPhase.icon} ${nextTask.title}`;
  } else {
    nu.style.display = 'none';
  }
}

function render() {
  const container = document.getElementById('phases');
  container.innerHTML = '';

  data.forEach((phase, pi) => {
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    phaseEl.dataset.id = phase.id;

    const doneCount = phase.tasks.filter(t => done.has(t.id)).length;

    phaseEl.innerHTML = `
      <div class="phase-header">
        <div class="phase-icon">${phase.icon}</div>
        <div class="phase-title">${pi + 1}. ${phase.title}</div>
        <div class="phase-count">${doneCount}/${phase.tasks.length}</div>
        <div class="phase-toggle">▾</div>
      </div>
      <div class="tasks"></div>
    `;

    const header = phaseEl.querySelector('.phase-header');
    header.addEventListener('click', () => {
      phaseEl.classList.toggle('collapsed');
    });

    const tasksEl = phaseEl.querySelector('.tasks');
    phase.tasks.forEach(task => {
      const isDone = done.has(task.id);
      // find first undone across all phases
      const isActive = !isDone && allTaskIds().find(id => !done.has(id)) === task.id;

      const taskEl = document.createElement('div');
      taskEl.className = 'task' + (isDone ? ' done' : '') + (isActive ? ' active' : '');
      taskEl.innerHTML = `
        <div class="checkbox"></div>
        <div class="task-body">
          <div class="task-title">${task.title}</div>
          <div class="task-detail">${task.detail}</div>
        </div>
        <div class="task-badge badge-${task.badge}">${badgeLabel(task.badge)}</div>
      `;
      taskEl.addEventListener('click', () => {
        if (done.has(task.id)) done.delete(task.id);
        else done.add(task.id);
        saveDone(done);
        render();
        updateProgress();
      });
      tasksEl.appendChild(taskEl);
    });

    container.appendChild(phaseEl);
  });

  updateProgress();
}

function badgeLabel(b) {
  return { buy:'購入', '3d':'3D設計', circuit:'回路', code:'コード', craft:'工作' }[b] || b;
}

// ── タイムライン ──
const TL_START = new Date('2026-06-16');
const TL_END   = new Date('2026-09-30');
const TL_TOTAL = TL_END - TL_START;

// フェーズごとの期間設定（start/end: 'YYYY-MM-DD', color）
const tlPhases = [
  { id:'buy',     label:'🛒 部品調達',       start:'2026-06-16', end:'2026-06-30', color:'#fbbf24' },
  { id:'check',   label:'📐 実寸確認',        start:'2026-06-20', end:'2026-07-07', color:'#a78bfa' },
  { id:'fusion',  label:'🖥️ Fusion設計',     start:'2026-06-25', end:'2026-07-31', color:'#7c3aed' },
  { id:'blade',   label:'⚔️ 刀身制作',        start:'2026-07-15', end:'2026-08-15', color:'#38bdf8' },
  { id:'circuit', label:'🔌 回路',            start:'2026-07-20', end:'2026-08-20', color:'#4ade80' },
  { id:'code',    label:'💻 ファームウェア',  start:'2026-08-01', end:'2026-09-15', color:'#4fc3f7' },
  { id:'sound',   label:'🎵 音源',            start:'2026-08-15', end:'2026-09-10', color:'#fb923c' },
  { id:'assemble',label:'🔧 組み立て',        start:'2026-09-01', end:'2026-09-30', color:'#fb7185' },
];

function pct(dateStr) {
  const d = new Date(dateStr);
  return Math.min(100, Math.max(0, (d - TL_START) / TL_TOTAL * 100));
}

function renderTimeline() {
  const el = document.getElementById('timeline-section');

  // 月ラベル計算
  const months = [];
  let cur = new Date(TL_START.getFullYear(), TL_START.getMonth(), 1);
  while (cur <= TL_END) {
    months.push({ label: `${cur.getMonth()+1}月`, pct: pct(cur.toISOString().slice(0,10)) });
    cur = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
  }
  months.push({ label:'10月', pct:100 });

  // 今日の位置
  const todayPct = pct('2026-06-16');

  let html = `<div class="timeline-heading">📅 タイムライン（6月〜9月末）</div>`;
  html += `<div class="tl-rows" id="tl-rows">`;

  // 月グリッド（相対的に後で入れる）
  const gridLines = months.map(m => `<div class="tl-grid-line" style="left:${m.pct}%"></div>`).join('');

  tlPhases.forEach(p => {
    const left = pct(p.start);
    const right = pct(p.end);
    const width = right - left;
    html += `
      <div class="tl-row">
        <div class="tl-row-label">${p.label}</div>
        <div class="tl-row-track">
          ${gridLines}
          <div class="tl-row-fill" style="left:${left}%;width:${width}%;background:${p.color}20;border:1px solid ${p.color}60;">
            <span style="color:${p.color}">${p.end.slice(5).replace('-','/')}</span>
          </div>
          <div class="tl-today" style="left:${todayPct}%"><div class="tl-today-label">今日</div></div>
        </div>
      </div>`;
  });

  // 月ラベル行
  html += `<div class="tl-row"><div class="tl-row-label"></div><div style="flex:1;position:relative;height:16px;">`;
  months.forEach(m => {
    html += `<div style="position:absolute;left:${m.pct}%;font-size:10px;color:var(--muted);transform:translateX(-2px)">${m.label}</div>`;
  });
  html += `</div></div>`;
  html += `</div>`;

  el.innerHTML = html;
}

render();
renderTimeline();
</script>
</body>
</html>
